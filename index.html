<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סידור עבודה שבועי</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f3f4f6;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 12px;
            color: #1f2937;
        }
        .app-container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2 {
            text-align: center;
            color: #111827;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input[type="color"] {
            height: 45px;
            padding: 2px;
            cursor: pointer;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 0;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #4338ca;
        }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        .flex-row > div {
            flex: 1;
        }
        .auto-date-badge {
            display: inline-block;
            background-color: #e0e7ff;
            color: #4338ca;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .template-zone {
            background-color: #f9fafb;
            border: 2px dashed #e5e7eb;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .btn-success { background-color: #10b981; }
        .btn-success:hover { background-color: #059669; }
        .btn-warning { background-color: #f59e0b; }
        .btn-warning:hover { background-color: #d97706; }
        .btn-danger { background-color: #ef4444; }
        .btn-danger:hover { background-color: #dc2626; }
        
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 750px;
            text-align: center;
        }
        th, td {
            padding: 12px 8px;
            border: 1px solid #e5e7eb;
            font-size: 0.9rem;
            vertical-align: middle;
        }
        th {
            background-color: #f9fafb;
            color: #374151;
            font-weight: bold;
        }
        
        /* תא השם בטבלה - מודגש מאוד וקבוע במקום */
        th.emp-col, td.emp-col {
            position: sticky;
            right: 0;
            font-weight: bold !important;
            color: #000000 !important;
            z-index: 2;
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
            min-width: 100px;
            font-size: 1rem;
        }
        
        /* ⬛ אזור המשמרת - שקוף לחלוטין בלי קופסה לבנה */
        .shift-box {
            background-color: transparent !important;
            border: none !important;
            padding: 4px 2px;
            position: relative;
            box-shadow: none !important;
            box-sizing: border-box;
        }
        
        .time-edit-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            direction: ltr;
        }
        
        /* 🔢 שדות השעות - נראים כמו טקסט שחור מודגש רגיל, אך ניתנים לעריכה בלחיצה */
        .inline-time-input {
            background: transparent !important;
            border: none !important;
            color: #000000 !important;
            font-weight: bold !important;
            font-size: 1.05rem !important; /* מעט גדול יותר לקריאות */
            width: 55px !important;
            padding: 0 !important;
            margin: 0 !important;
            text-align: center;
            cursor: pointer;
            font-family: inherit;
            display: inline-block;
            outline: none;
            -webkit-appearance: none;
        }
        
        /* הסתרת סמל השעון הדיפולטיבי של דפדפנים כדי להשאיר רק מספרים נקיים */
        .inline-time-input::-webkit-calendar-picker-indicator {
            display: none !important;
            -webkit-appearance: none !important;
        }
        
        .time-edit-container span {
            font-weight: bold;
            color: #000000;
            font-size: 1.05rem;
        }
        
        .print-only-time {
            display: none;
        }
        
        /* כפתור מחיקה קומפקטי ואדום מתחת לשעות */
        .delete-shift-btn {
            display: block;
            margin: 4px auto 0 auto;
            background: transparent;
            border: none;
            color: #ef4444;
            padding: 2px 6px;
            font-size: 0.75rem;
            cursor: pointer;
            width: auto;
            font-weight: bold;
        }
        .delete-shift-btn:hover {
            text-decoration: underline;
        }
        
        .emp-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .emp-badge {
            color: #000000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .remove-emp {
            background: none;
            border: none;
            color: #374151;
            cursor: pointer;
            padding: 0;
            margin: 0;
            font-size: 0.95rem;
            font-weight: bold;
        }
        
        #printBtn {
            background-color: #6b7280;
            margin-bottom: 0;
        }

        /* 🖨️ התאמות מיוחדות להדפסה */
        @media print {
            @page { 
                size: A4 landscape; 
                margin: 10mm; 
            }
            body { 
                background: white !important; 
                color: black !important; 
                padding: 0; 
                margin: 0; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            .card:not(.print-section), h1, button, .delete-shift-btn, .remove-emp, .template-zone, .time-edit-container { 
                display: none !important; 
            }
            .app-container { 
                max-width: 100% !important; 
                width: 100% !important; 
                padding: 0; 
                margin: 0; 
            }
            .card.print-section { 
                box-shadow: none !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                width: 100% !important; 
            }
            .table-container { 
                border: 1px solid #000 !important; 
                border-radius: 0 !important; 
                overflow: visible !important; 
                width: 100% !important; 
            }
            table { 
                width: 100% !important; 
                min-width: 100% !important; 
                table-layout: fixed; 
            }
            th, td { 
                padding: 10px 4px !important; 
                font-size: 11pt !important; 
                border: 1px solid #000 !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
            }
            th.emp-col, td.emp-col { 
                position: static !important; 
                box-shadow: none !important; 
                width: 12% !important; 
                font-weight: bold !important;
            }
            .shift-box { 
                background-color: transparent !important;
                border: none !important;
                box-shadow: none !important; 
                padding: 8px 4px !important;
            }
            /* שעות מודגשות ושחורות לחלוטין בהדפסה */
            .print-only-time { 
                display: block !important; 
                font-size: 12pt !important; 
                font-weight: bold !important; 
                color: #000000 !important; 
                direction: ltr !important;
                text-align: center !important;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>📅 סידור עבודה שבועי</h1>

    <div class="card">
        <h2>👤 הוספת עובד חדש</h2>
        <div class="flex-row">
            <div style="flex: 2;">
                <label>שם העובד:</label>
                <input type="text" id="empName" placeholder="למשל: קארם">
            </div>
            <div>
                <label>צבע:</label>
                <input type="color" id="empColor" value="#4f46e5">
            </div>
        </div>
        <button onclick="addEmployee()">שמור עובד</button>
        <div class="emp-tag-list" id="employeesList"></div>
    </div>

    <div class="card">
        <h2>⏰ הוספת משמרת לסידור</h2>
        <label>בחר עובד:</label>
        <select id="shiftEmployee">
            <option value="">-- בחר עובד --</option>
        </select>

        <div class="flex-row">
            <div>
                <label>יום בשבוע:</label>
                <select id="shiftDay" onchange="autoCalculateDate()">
                    <option value="0">ראשון</option>
                    <option value="1">שני</option>
                    <option value="2">שלישי</option>
                    <option value="3">רביעי</option>
                    <option value="4">חמישי</option>
                    <option value="5">שישי</option>
                    <option value="6">שבת</option>
                </select>
            </div>
            <div>
                <label style="visibility: hidden;">תאריך מחושב:</label>
                <div id="autoDateLabel" class="auto-date-badge">תאריך אוטומטי: </div>
                <input type="hidden" id="shiftDate">
            </div>
        </div>

        <div class="flex-row">
            <div>
                <label>משעה:</label>
                <input type="time" id="startTime" value="15:00">
            </div>
            <div>
                <label>עד שעה:</label>
                <input type="time" id="endTime" value="23:00">
            </div>
        </div>

        <button onclick="addShift()">הוסף לטבלה השבועית</button>
    </div>

    <div class="card print-section" style="padding: 10px;">
        <h2>📋 לוח המשמרות לשבוע זה</h2>
        
        <div class="template-zone">
            <label>⚡ אפשרויות שכפול וחיסכון בזמן:</label>
            <div class="flex-row" style="margin-bottom: 10px;">
                <button class="btn-success" onclick="saveAsTemplate()">💾 שמור סידור זה כתבנית קבועה</button>
                <button class="btn-warning" onclick="loadTemplate()">🔄 טען סידור מהתבנית הקבועה</button>
            </div>
            <button class="btn-danger" onclick="clearCurrentWeek()">🗑️ מחק את כל המשמרות השבוע (התחל מחדש)</button>
        </div>

        <button id="printBtn" class="btn-success" style="background-color: #10b981; margin-bottom: 15px;" onclick="window.print()">🖨️ הדפס סידור עבודה (מסך מלא)</button>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="emp-col">שם עובד</th>
                        <th id="th-0">ראשון</th>
                        <th id="th-1">שני</th>
                        <th id="th-2">שלישי</th>
                        <th id="th-3">רביעי</th>
                        <th id="th-4">חמישי</th>
                        <th id="th-5">שישי</th>
                        <th id="th-6">שבת</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const daysNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];

    let employees = JSON.parse(localStorage.getItem('grid_employees')) || [];
    let shifts = JSON.parse(localStorage.getItem('grid_shifts')) || [];

    function getCurrentWeekDates() {
        const now = new Date();
        const currentDay = now.getDay();
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - currentDay);

        const dates = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(startOfWeek);
            d.setDate(startOfWeek.getDate() + i);
            dates.push(d.toISOString().split('T')[0]);
        }
        return dates;
    }

    function autoCalculateDate() {
        const dayIndex = parseInt(document.getElementById('shiftDay').value);
        const weekDates = getCurrentWeekDates();
        const selectedDate = weekDates[dayIndex];
        
        document.getElementById('shiftDate').value = selectedDate;
        
        const parts = selectedDate.split('-');
        document.getElementById('autoDateLabel').innerText = `תאריך אוטומטי: ${parts[2]}/${parts[1]}`;
    }

    function updateTableHeaders() {
        const weekDates = getCurrentWeekDates();
        for (let i = 0; i < 7; i++) {
            const parts = weekDates[i].split('-');
            const formattedDate = `${parts[2]}/${parts[1]}`;
            document.getElementById(`th-${i}`).innerText = `יום ${daysNames[i]} (${formattedDate})`;
        }
    }

    function getPastelRGBA(hexColor, alpha = 0.15) {
        let hex = hexColor.replace('#', '');
        let r = parseInt(hex.substring(0, 2), 16);
        let g = parseInt(hex.substring(2, 4), 16);
        let b = parseInt(hex.substring(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function addEmployee() {
        const name = document.getElementById('empName').value.trim();
        const color = document.getElementById('empColor').value;

        if (!name) return alert('נא להזין שם עובד');

        employees.push({ id: Date.now().toString(), name, color });
        localStorage.setItem('grid_employees', JSON.stringify(employees));
        
        document.getElementById('empName').value = '';
        renderApp();
    }

    function deleteEmployee(id) {
        if(confirm('האם אתה בטוח שברצונך למחוק את העובד? המשמרות שלו יישארו בטבלה.')) {
            employees = employees.filter(e => e.id !== id);
            localStorage.setItem('grid_employees', JSON.stringify(employees));
            renderApp();
        }
    }

    function addShift() {
        const empId = document.getElementById('shiftEmployee').value;
        const date = document.getElementById('shiftDate').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;

        if (!empId) return alert('נא לבחור עובד מהרשימה');
        if (!date) return alert('שגיאה בחישוב התאריך האוטומטי');
        if (!start || !end) return alert('נא למלא שעות משמרת');

        shifts.push({ id: Date.now().toString(), empId, date, start, end });
        localStorage.setItem('grid_shifts', JSON.stringify(shifts));
        renderApp();
    }

    function deleteShift(id) {
        shifts = shifts.filter(s => s.id !== id);
        localStorage.setItem('grid_shifts', JSON.stringify(shifts));
        renderApp();
    }

    function updateInlineShiftTime(id, val, field) {
        const shift = shifts.find(s => s.id === id);
        if (shift) {
            shift[field] = val;
            localStorage.setItem('grid_shifts', JSON.stringify(shifts));
            const textElement = document.getElementById(`print-time-${id}`);
            if(textElement) {
                textElement.innerText = `${shift.start} - ${shift.end}`;
            }
        }
    }

    function saveAsTemplate() {
        const weekDates = getCurrentWeekDates();
        const currentWeekShifts = shifts.filter(s => weekDates.includes(s.date));
        
        if (currentWeekShifts.length === 0) {
            return alert('אין משמרות בטבלה הנוכחית כדי לשמור כתבנית.');
        }
        
        const template = currentWeekShifts.map(s => {
            return {
                empId: s.empId,
                dayIndex: weekDates.indexOf(s.date),
                start: s.start,
                end: s.end
            };
        });
        
        localStorage.setItem('grid_template', JSON.stringify(template));
        alert('הסידור הנוכחי נשמר בהצלחה כתבנית קבועה!');
    }

    function loadTemplate() {
        const template = JSON.parse(localStorage.getItem('grid_template')) || [];
        if (template.length === 0) {
            return alert('לא נמצאה תבנית שמורה. קודם כל סדר את השבוע הנוכחי ולחץ "שמור כתבנית קבועה".');
        }
        
        if (confirm('טעינת התבנית תמחק את המשמרות הקיימות בשבוע זה. להמשיך?')) {
            const weekDates = getCurrentWeekDates();
            shifts = shifts.filter(s => !weekDates.includes(s.date));
            
            template.forEach((t, index) => {
                shifts.push({
                    id: (Date.now() + index).toString(),
                    empId: t.empId,
                    date: weekDates[t.dayIndex],
                    start: t.start,
                    end: t.end
                });
            });
            
            localStorage.setItem('grid_shifts', JSON.stringify(shifts));
            renderApp();
        }
    }

    function clearCurrentWeek() {
        if (confirm('האם אתה בטוח שברצונך למחוק את כל המשמרות של השבוע הנוכחי?')) {
            const weekDates = getCurrentWeekDates();
            shifts = shifts.filter(s => !weekDates.includes(s.date));
            localStorage.setItem('grid_shifts', JSON.stringify(shifts));
            renderApp();
        }
    }

    function renderApp() {
        updateTableHeaders();
        
        const listDiv = document.getElementById('employeesList');
        const select = document.getElementById('shiftEmployee');
        listDiv.innerHTML = '';
        select.innerHTML = '<option value="">-- בחר עובד --</option>';

        employees.forEach(emp => {
            listDiv.innerHTML += `
                <span class="emp-badge" style="background-color: ${getPastelRGBA(emp.color, 0.2)}; border: 2px solid ${emp.color};">
                    ${emp.name}
                    <button class="remove-emp" onclick="deleteEmployee('${emp.id}')">×</button>
                </span>`;
            select.innerHTML += `<option value="${emp.id}">${emp.name}</option>';`;
        });

        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        if (employees.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8" style="color: #6b7280; padding: 20px;">טרם הוספת עובדים למערכת.</td></tr>`;
            return;
        }

        const weekDates = getCurrentWeekDates();

        employees.forEach(emp => {
            const rowBgStyle = `background-color: ${getPastelRGBA(emp.color, 0.16)} !important;`;
            
            let rowHtml = `<tr>`;
            rowHtml += `<td class="emp-col" style="${rowBgStyle} border-right: 5px solid ${emp.color};">${emp.name}</td>`;
            
            for (let i = 0; i < 7; i++) {
                const currentDate = weekDates[i];
                const dayShift = shifts.find(s => s.empId === emp.id && s.date === currentDate);
                
                rowHtml += `<td style="${rowBgStyle}">`;
                if (dayShift) {
                    rowHtml += `
                        <div class="shift-box">
                            <div class="time-edit-container">
                                <input type="time" class="inline-time-input" value="${dayShift.start}" onchange="updateInlineShiftTime('${dayShift.id}', this.value, 'start')">
                                <span>-</span>
                                <input type="time" class="inline-time-input" value="${dayShift.end}" onchange="updateInlineShiftTime('${dayShift.id}', this.value, 'end')">
                            </div>
                            <div class="print-only-time" id="print-time-${dayShift.id}">${dayShift.start} - ${dayShift.end}</div>
                            
                            <button class="delete-shift-btn" onclick="deleteShift('${dayShift.id}')
